version = 0.1

# Deploy with:  sam deploy --config-env prod
# (CodeUri points at the esbuild output, so run `node libs/backend/lambdas/build.mjs`
#  first — the buildspec does this in CI.)

[default.deploy.parameters]
stack_name = "sailor"
region = "us-east-1"
capabilities = "CAPABILITY_IAM"
resolve_s3 = true
confirm_changeset = false
fail_on_empty_changeset = false
parameter_overrides = "Stage=\"dev\" AllowedOrigins=\"http://localhost:4200\""

[prod.deploy.parameters]
stack_name = "sailor-prod"
region = "us-east-1"
capabilities = "CAPABILITY_IAM"
resolve_s3 = true
confirm_changeset = false
fail_on_empty_changeset = false
parameter_overrides = "Stage=\"prod\" AllowedOrigins=\"https://sailor.toondeboer.com\" CognitoUserPoolId=\"us-east-1_liCB4LgDE\" CognitoClientId=\"3o34bbl92faeo9ljo11eebtim2\" TableName=\"sailor\""
