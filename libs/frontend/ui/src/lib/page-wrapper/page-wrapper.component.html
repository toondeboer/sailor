<div class="app-shell" [class.is-mobile]="mobileQuery.matches">

  <mat-toolbar class="app-toolbar">
    <button mat-icon-button (click)="snav.toggle()" aria-label="Toggle navigation">
      <mat-icon>menu</mat-icon>
    </button>

    <a class="nav-brand" [routerLink]="['dashboard']">
      <img src="assets/logo.png" alt="sailor" class="nav-logo" />
      <span class="wordmark">s<span class="ai">ai</span>lor</span>
    </a>

    <span class="nav-spacer"></span>
    <aws-scrolling-text></aws-scrolling-text>
  </mat-toolbar>

  <mat-progress-bar
    *ngIf="loading$ | async"
    mode="indeterminate"
    color="accent"
    class="loading-bar"
  ></mat-progress-bar>

  <mat-sidenav-container
    class="sidenav-container"
    [style.marginTop.px]="mobileQuery.matches ? 56 : 0"
  >
    <mat-sidenav
      #snav
      class="app-sidenav"
      [mode]="mobileQuery.matches ? 'over' : 'side'"
      [fixedInViewport]="mobileQuery.matches"
      fixedTopGap="56"
    >
      <div class="sidenav-inner">
        <mat-nav-list>
          <a
            mat-list-item
            class="nav-item"
            *ngFor="let nav of navigationOptions"
            (click)="routeTo(nav.path, snav)"
          >
            <mat-icon matListItemIcon>{{ nav.icon }}</mat-icon>
            <span matListItemTitle>{{ nav.text }}</span>
          </a>
        </mat-nav-list>

        <div class="sidenav-footer">
          <button mat-button class="logout-btn" (click)="logout()">
            <mat-icon>logout</mat-icon>
            Log out
          </button>
        </div>
      </div>
    </mat-sidenav>

    <mat-sidenav-content>
      <router-outlet></router-outlet>
    </mat-sidenav-content>
  </mat-sidenav-container>

</div>
