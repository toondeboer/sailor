<div class="app-shell" [class.is-mobile]="mobileQuery.matches">

  <mat-toolbar class="app-toolbar">
    <button mat-icon-button class="menu-btn" (click)="snav.toggle()" aria-label="Toggle navigation">
      <mat-icon>menu</mat-icon>
    </button>
    <aws-scrolling-text></aws-scrolling-text>
  </mat-toolbar>

  <mat-progress-bar
    *ngIf="loading$ | async"
    mode="indeterminate"
    color="accent"
    class="loading-bar"
  ></mat-progress-bar>

  <mat-sidenav-container
    class="sidenav-container"
    [style.marginTop.px]="mobileQuery.matches ? 56 : 0"
  >
    <mat-sidenav
      #snav
      class="app-sidenav"
      [mode]="mobileQuery.matches ? 'over' : 'side'"
      [fixedInViewport]="mobileQuery.matches"
      fixedTopGap="56"
    >
      <div class="sidenav-inner">

        <div class="sidenav-header">
          <img src="assets/logo.png" alt="sailor" class="sidenav-logo" />
          <span class="wordmark">s<span class="ai">ai</span>lor</span>
        </div>

        <mat-nav-list>
          <a
            mat-list-item
            class="nav-item"
            [class.active]="isActive(nav.path)"
            *ngFor="let nav of navigationOptions"
            (click)="routeTo(nav.path, snav)"
          >
            <span class="nav-inner">
              <mat-icon>{{ nav.icon }}</mat-icon>
              <span>{{ nav.text }}</span>
            </span>
          </a>
        </mat-nav-list>

        <div class="sidenav-footer">
          <button mat-button class="logout-btn" (click)="logout()">
            <mat-icon>logout</mat-icon>
            Log out
          </button>
        </div>

      </div>
    </mat-sidenav>

    <mat-sidenav-content>
      <router-outlet></router-outlet>
    </mat-sidenav-content>
  </mat-sidenav-container>

</div>
