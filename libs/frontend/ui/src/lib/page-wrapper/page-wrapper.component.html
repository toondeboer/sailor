<div class="app-shell" [class.is-mobile]="mobileQuery.matches">

  <!-- ── Toolbar ──────────────────────────────────────────────────────────── -->
  <header class="app-toolbar">
    <button class="menu-btn" (click)="sidenavOpen = !sidenavOpen" aria-label="Toggle navigation">
      <lucide-icon name="Menu" [size]="20"></lucide-icon>
    </button>
    <aws-scrolling-text></aws-scrolling-text>
  </header>

  <!-- ── Loading bar ──────────────────────────────────────────────────────── -->
  <div *ngIf="loading$ | async" class="loading-bar">
    <div class="loading-bar-inner"></div>
  </div>

  <!-- ── Body ─────────────────────────────────────────────────────────────── -->
  <div class="app-body" [style.marginTop.px]="mobileQuery.matches ? 56 : 0">

    <!-- Mobile overlay -->
    <div
      *ngIf="mobileQuery.matches && sidenavOpen"
      class="sidenav-overlay"
      (click)="sidenavOpen = false"
    ></div>

    <!-- ── Sidenav ─────────────────────────────────────────────────────────── -->
    <nav
      class="app-sidenav"
      [class.sidenav-open]="sidenavOpen"
      [class.sidenav-mobile]="mobileQuery.matches"
      [class.sidenav-desktop-closed]="!mobileQuery.matches && !sidenavOpen"
    >
      <div class="sidenav-inner">

        <div class="sidenav-header">
          <img src="assets/logo.png" alt="sailor" class="sidenav-logo" />
          <span class="wordmark">s<span class="ai">ai</span>lor</span>
        </div>

        <ul class="nav-list">
          <li *ngFor="let nav of navigationOptions">
            <button
              class="nav-item"
              [class.active]="isActive(nav.path)"
              (click)="routeTo(nav.path)"
            >
              <lucide-icon [name]="nav.icon" [size]="20" class="nav-icon"></lucide-icon>
              <span>{{ nav.text }}</span>
            </button>
          </li>
        </ul>

        <div class="sidenav-footer">
          <button class="logout-btn" (click)="logout()">
            <lucide-icon name="LogOut" [size]="18"></lucide-icon>
            Log out
          </button>
        </div>

      </div>
    </nav>

    <!-- ── Main content ───────────────────────────────────────────────────── -->
    <main class="app-content">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
