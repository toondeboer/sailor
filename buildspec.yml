version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
      python: 3.13
    commands:
      - echo Installing nx...
      - yarn global add nx
      - sam --version || pip install aws-sam-cli
  pre_build:
    commands:
      - echo Installing frontend dependencies...
      - yarn install
  build:
    commands:
      - echo Building frontend...
      - nx build frontend
      - echo Building Python Lambda packages...
      # sam build installs requirements.txt into each function's deployment package.
      - sam build
      - echo Build completed on `date`
  post_build:
    commands:
      - echo Deploying backend stack with SAM...
      - sam deploy --config-env prod --no-confirm-changeset --no-fail-on-empty-changeset
      - echo Deployment completed on `date`

artifacts:
  files: '**/*'
  base-directory: dist/apps/frontend
